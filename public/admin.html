<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MoProPrep</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
</head>

<body class="admin-body">
    <div class="app-container">
        <header class="glass-header">
            <a href="/" class="logo"
                style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.5rem;">
                <span class="logo-icon">🩺</span>
                <h1>MoProPrep Admin</h1>
            </a>
            <div style="text-align: right;">
                <div id="admin-email-display" style="font-size: 0.8rem; color: #aaa; margin-bottom: 4px;">Connecting...
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button id="btn-view-stats" class="secondary-btn" style="padding: 0.5rem 1rem;">Analytics
                        📊</button>
                    <button id="btn-logout" class="icon-btn">Logout</button>
                </div>
            </div>
        </header>

        <!-- Diagnostic Alert Box -->
        <div id="diagnostic-box"
            style="display:none; background: #e74c3c; color: white; padding: 1rem; margin: 1rem 0; border-radius: 8px;">
            <strong>Diagnostics:</strong> <span id="diagnostic-msg"></span>
        </div>

        <main id="admin-content" style="display: none;">
            <div class="stats-grid">
                <div class="glass-card stat-card">
                    <h3>Total Users</h3>
                    <p id="total-users">0</p>
                </div>
                <div class="glass-card stat-card">
                    <h3>Pro Members</h3>
                    <p id="pro-users">0</p>
                </div>
            </div>

            <div class="glass-card" style="margin-top: 2rem;">
                <h2>Pricing Control</h2>
                <div style="display: flex; gap: 1rem; align-items: center; margin-top: 1rem;">
                    <label for="pro-price">Pro Membership Price (INR):</label>
                    <input type="number" id="pro-price" min="1" value="299"
                        style="padding: 0.5rem; border-radius: 8px; border: 1px solid #555; background: #222; color: #fff; width: 100px;">
                    <button id="btn-save-price" class="primary-btn" style="padding: 0.5rem 1rem;">Save Price</button>
                </div>
                <p id="price-status" style="margin-top: 0.5rem; font-size: 0.9rem; color: #888;"></p>
            </div>

            <div class="glass-card" style="margin-top: 2rem;">
                <h2>User Feedback & Ratings</h2>
                <div style="max-height: 400px; overflow-y: auto; margin-top: 1rem;">
                    <table id="feedback-table" style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1);">
                                <th>Date</th>
                                <th>User</th>
                                <th>Rating</th>
                                <th>Suggestion</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="4" style="text-align: center; padding: 1rem;">Loading feedback...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="glass-card" style="margin-top: 2rem;">
                <h2>User List</h2>

                <!-- Search Box -->
                <div style="margin-bottom: 1rem;">
                    <input type="text" id="user-search" placeholder="Search by name or email..."
                        style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid #555; background: #222; color: #fff; font-size: 1rem;">
                </div>

                <!-- Pagination Controls -->
                <div id="pagination-controls"
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <button id="prev-page" class="secondary-btn"
                        style="padding: 0.5rem 1rem; opacity: 1; transition: opacity 0.3s;" disabled>←
                        Previous</button>
                    <span id="page-info" style="color: #888;">Page 1 of 1</span>
                    <button id="next-page" class="secondary-btn"
                        style="padding: 0.5rem 1rem; opacity: 1; transition: opacity 0.3s;" disabled>Next →</button>
                </div>

                <style>
                    .secondary-btn:disabled {
                        opacity: 0.4 !important;
                        cursor: not-allowed;
                        pointer-events: none;
                    }
                </style>

                <table id="user-table" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1);">
                            <th>Name</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Referrals</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>

        <div id="login-overlay"
            style="display: flex; height: 80vh; align-items: center; justify-content: center; flex-direction: column;">
            <h2>Admin Login Required</h2>
            <p>Only the specific admin email can access this.</p>
            <button id="btn-admin-login" class="primary-btn">Login with Google</button>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = "adityasonofashok@gmail.com";

        auth.onAuthStateChanged(async (user) => {
            const emailDisplay = document.getElementById('admin-email-display');
            if (user) {
                emailDisplay.innerText = `Logged in as: ${user.email}`;
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('admin-content').style.display = 'block';
                    loadStats();
                    loadFeedback();
                    loadPrice();
                } else {
                    document.getElementById('diagnostic-box').style.display = 'block';
                    document.getElementById('diagnostic-msg').innerText = `Unauthorized Email: ${user.email}. Expected: ${ADMIN_EMAIL}`;
                    // alert("Unauthorized. Access denied.");
                    // auth.signOut(); // Commented out to allow user to see the error
                }
            } else {
                emailDisplay.innerText = "Not logged in";
            }
        });

        document.getElementById('btn-admin-login').onclick = () => auth.signInWithPopup(provider);
        document.getElementById('btn-logout').onclick = () => auth.signOut().then(() => location.reload());
        document.getElementById('btn-view-stats').onclick = () => window.location.href = 'stats.html';


        // --- Price Control Logic ---
        async function loadPrice() {
            try {
                const doc = await db.collection('settings').doc('pricing').get();
                if (doc.exists) {
                    document.getElementById('pro-price').value = doc.data().amount || 299;
                    document.getElementById('price-status').innerText = 'Loaded from Firestore.';
                } else {
                    // Create default pricing doc
                    await db.collection('settings').doc('pricing').set({ amount: 299 });
                    document.getElementById('price-status').innerText = 'Default price set (299).';
                }
            } catch (e) {
                console.error("Failed to load price:", e);
                document.getElementById('price-status').innerText = 'Error loading price.';
            }
        }

        document.getElementById('btn-save-price').onclick = async () => {
            const priceInput = document.getElementById('pro-price');
            const newPrice = parseInt(priceInput.value);
            if (isNaN(newPrice) || newPrice < 1) {
                alert("Please enter a valid price (minimum 1).");
                return;
            }
            document.getElementById('price-status').innerText = 'Saving...';
            try {
                console.log("Saving price:", newPrice, "to settings/pricing");
                await db.collection('settings').doc('pricing').set({ amount: newPrice }, { merge: true });
                document.getElementById('price-status').innerText = 'Price updated to ₹' + newPrice + ' at ' + new Date().toLocaleTimeString();
                console.log("Price saved successfully!");
            } catch (e) {
                console.error("Failed to save price:", e.message, e.code, e);
                document.getElementById('price-status').innerText = 'Error: ' + e.message;
                alert("Failed to save price: " + e.message);
            }
        };

        // --- Toggle Pro Status ---
        async function toggleProStatus(uid, currentStatus, displayName) {
            const newStatus = !currentStatus;
            const action = newStatus ? 'grant PRO to' : 'remove PRO from';

            if (!confirm(`Are you sure you want to ${action} ${displayName || uid}?`)) {
                return;
            }

            try {
                await db.collection('users').doc(uid).update({
                    isPro: newStatus,
                    proModifiedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    proModifiedBy: 'admin'
                });

                alert(`Successfully ${newStatus ? 'granted' : 'removed'} PRO status for ${displayName || uid}`);
                loadStats(); // Refresh the list
            } catch (e) {
                console.error("Failed to toggle Pro status:", e);
                alert("Failed to update Pro status: " + e.message);
            }
        }

        // --- User Feedback Logic ---
        async function loadFeedback() {
            try {
                const feedbackSnap = await db.collection('feedback').orderBy('timestamp', 'desc').get();
                const tableBody = document.querySelector('#feedback-table tbody');
                tableBody.innerHTML = '';

                if (feedbackSnap.empty) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 1rem;">No feedback received yet.</td></tr>';
                    return;
                }

                feedbackSnap.forEach(doc => {
                    const f = doc.data();
                    const date = f.timestamp ? f.timestamp.toDate().toLocaleDateString() : 'N/A';
                    const stars = '⭐'.repeat(f.rating) + '☆'.repeat(5 - f.rating);

                    const row = `<tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <td style="padding: 0.8rem 0; font-size: 0.85rem;">${date}</td>
                        <td style="padding: 0.8rem 0; font-size: 0.85rem;">${f.userEmail || 'Anonymous'}</td>
                        <td style="padding: 0.8rem 0; color: #FFD700;">${stars}</td>
                        <td style="padding: 0.8rem 0; font-size: 0.85rem; max-width: 300px; white-space: normal; word-break: break-all;">${f.suggestion || 'No suggestion'}</td>
                    </tr>`;
                    tableBody.insertAdjacentHTML('beforeend', row);
                });
            } catch (e) {
                console.error("Failed to load feedback:", e);
                document.querySelector('#feedback-table tbody').innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 1rem; color: #f87171;">Error loading feedback.</td></tr>';
            }
        }

        // --- Pagination & Search State ---
        let allUsers = [];
        let filteredUsers = [];
        let currentPage = 1;
        const usersPerPage = 10;

        // --- Search Event Listener ---
        document.getElementById('user-search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (query === '') {
                filteredUsers = [...allUsers];
            } else {
                filteredUsers = allUsers.filter(u =>
                    (u.displayName && u.displayName.toLowerCase().includes(query)) ||
                    (u.email && u.email.toLowerCase().includes(query))
                );
            }
            currentPage = 1;
            renderUserTable();
        });

        // --- Pagination Event Listeners ---
        document.getElementById('prev-page').onclick = () => {
            if (currentPage > 1) {
                currentPage--;
                renderUserTable();
            }
        };

        document.getElementById('next-page').onclick = () => {
            const totalPages = Math.ceil(filteredUsers.length / usersPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderUserTable();
            }
        };

        // --- Render User Table with Pagination ---
        function renderUserTable() {
            const tableBody = document.querySelector('#user-table tbody');
            tableBody.innerHTML = '';

            const totalPages = Math.ceil(filteredUsers.length / usersPerPage) || 1;
            const startIndex = (currentPage - 1) * usersPerPage;
            const endIndex = startIndex + usersPerPage;
            const usersToShow = filteredUsers.slice(startIndex, endIndex);

            if (usersToShow.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 1rem; color: #888;">No users found.</td></tr>';
            } else {
                usersToShow.forEach(u => {
                    const btnClass = u.isPro ? 'secondary-btn' : 'primary-btn';
                    const btnText = u.isPro ? '❌ Remove PRO' : '✅ Grant PRO';

                    const row = `<tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <td style="padding: 0.75rem 0;">${u.displayName || 'N/A'}</td>
                        <td style="padding: 0.75rem 0;">${u.email}</td>
                        <td style="padding: 0.75rem 0;">${u.isPro ? '💎 PRO' : 'Free'}</td>
                        <td style="padding: 0.75rem 0;">
                            <span id="ref-cell-${u.uid}" style="font-weight: 600; color: var(--text-main);">—</span>
                            <a href="#" onclick="event.preventDefault(); toggleDetailsRow('${u.uid}', 'referrals')" 
                               style="margin-left: 0.4rem; font-size: 0.75rem; color: var(--primary); text-decoration: underline; cursor: pointer;">Details</a>
                        </td>
                        <td style="padding: 0.75rem 0;">
                            <div style="display: flex; gap: 0.35rem; align-items: center;">
                                <button class="${btnClass}" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;" 
                                        onclick="toggleProStatus('${u.uid}', ${u.isPro}, '${(u.displayName || u.email || '').replace(/'/g, "\\'")}')">
                                    ${btnText}
                                </button>
                                <button class="secondary-btn" style="padding: 0.25rem 0.5rem; font-size: 0.75rem; background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.3); color: #818cf8;" 
                                        onclick="toggleDetailsRow('${u.uid}', 'progress')">
                                    📈 Progress
                                </button>
                            </div>
                        </td>
                    </tr>
                    <tr id="details-row-${u.uid}" style="display: none; background: rgba(0,0,0,0.15); border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <td colspan="5" style="padding: 1rem;">
                            <div style="display: flex; flex-direction: column; gap: 1rem; text-align: left;">
                                <div id="details-referrals-${u.uid}" style="display: none;">
                                    <h4 style="margin: 0 0 0.5rem 0; font-size: 0.95rem; color: var(--secondary);">👥 Referrals List</h4>
                                    <div id="details-referrals-list-${u.uid}" style="font-size: 0.85rem; color: #ccc;">
                                        Loading referrals...
                                    </div>
                                </div>
                                <div id="details-progress-${u.uid}" style="display: none;">
                                    <h4 style="margin: 0 0 0.5rem 0; font-size: 0.95rem; color: var(--primary);">📈 Student Progress Stats</h4>
                                    <div id="details-progress-content-${u.uid}" style="font-size: 0.85rem; color: #ccc;">
                                        Loading progress...
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>`;
                    tableBody.insertAdjacentHTML('beforeend', row);

                    // Fetch referral count asynchronously and display as text
                    (async () => {
                        try {
                            const refSnap = await db.collection('users').doc(u.uid).collection('referrals').get();
                            const cell = document.getElementById(`ref-cell-${u.uid}`);
                            if (cell) cell.innerText = refSnap.size;
                        } catch (err) {
                            const cell = document.getElementById(`ref-cell-${u.uid}`);
                            if (cell) cell.innerText = '⚠️';
                        }
                    })();
                });
            }

            // Update pagination controls
            document.getElementById('page-info').innerText = `Page ${currentPage} of ${totalPages} (${filteredUsers.length} users)`;
            document.getElementById('prev-page').disabled = currentPage === 1;
            document.getElementById('next-page').disabled = currentPage >= totalPages;
        }

        async function toggleDetailsRow(uid, tab) {
            const detailsRow = document.getElementById(`details-row-${uid}`);
            const refSection = document.getElementById(`details-referrals-${uid}`);
            const progSection = document.getElementById(`details-progress-${uid}`);
            
            if (!detailsRow) return;
            
            // If the row is currently open and we clicked the active tab, close it
            const isCurrentlyOpen = detailsRow.style.display !== 'none';
            const isRefActive = refSection.style.display !== 'none';
            const isProgActive = progSection.style.display !== 'none';
            
            if (isCurrentlyOpen && ((tab === 'referrals' && isRefActive) || (tab === 'progress' && isProgActive))) {
                detailsRow.style.display = 'none';
                refSection.style.display = 'none';
                progSection.style.display = 'none';
                return;
            }
            
            // Otherwise, show the correct tab
            detailsRow.style.display = 'table-row';
            if (tab === 'referrals') {
                refSection.style.display = 'block';
                progSection.style.display = 'none';
                await loadReferralsDetails(uid);
            } else {
                refSection.style.display = 'none';
                progSection.style.display = 'block';
                await loadProgressDetails(uid);
            }
        }

        async function loadReferralsDetails(uid) {
            const listEl = document.getElementById(`details-referrals-list-${uid}`);
            if (!listEl) return;
            
            // If already loaded, don't refetch
            if (listEl.getAttribute('data-loaded') === 'true') return;
            
            listEl.innerText = "Loading referrals list...";
            try {
                const refSnap = await db.collection('users').doc(uid).collection('referrals').get();
                if (refSnap.empty) {
                    listEl.innerHTML = "<span style='color: #888; font-style: italic;'>No referrals found for this student.</span>";
                    listEl.setAttribute('data-loaded', 'true');
                    return;
                }
                
                let html = '<ul style="margin: 0; padding-left: 1.2rem; display: flex; flex-direction: column; gap: 0.4rem;">';
                refSnap.forEach(doc => {
                    const r = doc.data();
                    const date = r.timestamp ? (r.timestamp.toDate ? r.timestamp.toDate().toLocaleDateString() : new Date(r.timestamp).toLocaleDateString()) : 'N/A';
                    html += `<li><strong>${r.displayName || r.email || doc.id}</strong> - ${r.email || ''} (Joined: ${date})</li>`;
                });
                html += '</ul>';
                listEl.innerHTML = html;
                listEl.setAttribute('data-loaded', 'true');
            } catch (err) {
                console.error("Failed to load referrals list:", err);
                listEl.innerHTML = `<span style='color: #f87171;'>Failed to load: ${err.message}</span>`;
            }
        }

        async function loadProgressDetails(uid) {
            const contentEl = document.getElementById(`details-progress-content-${uid}`);
            if (!contentEl) return;
            
            // If already loaded, don't refetch
            if (contentEl.getAttribute('data-loaded') === 'true') return;
            
            contentEl.innerText = "Loading student progress...";
            try {
                // Fetch progress solve history from users/{uid}/progress/moproprep_solve_history
                const doc = await db.collection('users').doc(uid).collection('progress').doc('moproprep_solve_history').get();
                if (!doc.exists) {
                    contentEl.innerHTML = "<span style='color: #888; font-style: italic;'>No progress history found. This user hasn't completed any quizzes yet.</span>";
                    contentEl.setAttribute('data-loaded', 'true');
                    return;
                }
                
                const data = doc.data();
                const history = data.history || [];
                if (history.length === 0) {
                    contentEl.innerHTML = "<span style='color: #888; font-style: italic;'>No progress history found in records.</span>";
                    contentEl.setAttribute('data-loaded', 'true');
                    return;
                }
                
                // Calculate metrics
                const totalAttempted = history.length;
                const correctCount = history.filter(h => h.isCorrect).length;
                const accuracy = totalAttempted > 0 ? Math.round((correctCount / totalAttempted) * 100) : 0;
                
                // Subject wise accuracy
                const subjectStats = {};
                history.forEach(h => {
                    const sub = h.subject || 'General';
                    if (!subjectStats[sub]) {
                        subjectStats[sub] = { attempted: 0, correct: 0 };
                    }
                    subjectStats[sub].attempted++;
                    if (h.isCorrect) subjectStats[sub].correct++;
                });
                
                let subjectRows = '';
                Object.entries(subjectStats).forEach(([sub, stats]) => {
                    const subAcc = Math.round((stats.correct / stats.attempted) * 100);
                    subjectRows += `
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.35rem 0.5rem; background: rgba(255,255,255,0.03); border-radius: 6px; font-size: 0.8rem;">
                            <span>${sub}</span>
                            <span style="font-weight: 600; color: ${subAcc >= 70 ? '#34d399' : subAcc >= 50 ? '#f59e0b' : '#f87171'};">
                                ${stats.correct}/${stats.attempted} (${subAcc}%)
                            </span>
                        </div>
                    `;
                });
                
                // Recent activity: last 5 questions
                const sortedHistory = [...history].sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
                const recent = sortedHistory.slice(0, 5);
                let recentHtml = '<ul style="margin: 0.5rem 0 0 0; padding-left: 1.2rem; display: flex; flex-direction: column; gap: 0.25rem;">';
                recent.forEach(h => {
                    const status = h.isCorrect ? '✅ Correct' : '❌ Incorrect';
                    const date = h.timestamp ? new Date(h.timestamp).toLocaleDateString() : '';
                    recentHtml += `<li>QID: ${h.qId} - ${h.subject || 'General'} (${status}) <span style="font-size: 0.75rem; color: #888;">${date}</span></li>`;
                });
                recentHtml += '</ul>';
                
                const html = `
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                        <div class="glass-card" style="padding: 0.75rem; background: rgba(255,255,255,0.02);">
                            <h5 style="margin: 0 0 0.5rem 0; font-size: 0.85rem; text-transform: uppercase; color: #888;">Summary Stats</h5>
                            <p style="margin: 0; font-size: 1.15rem; font-weight: 700; color: var(--text-main);">${totalAttempted} Attempted</p>
                            <p style="margin: 0.25rem 0 0 0; font-size: 0.9rem; font-weight: 600; color: var(--primary);">Overall Accuracy: ${accuracy}%</p>
                        </div>
                        
                        <div class="glass-card" style="padding: 0.75rem; background: rgba(255,255,255,0.02); display: flex; flex-direction: column; gap: 0.35rem;">
                            <h5 style="margin: 0 0 0.5rem 0; font-size: 0.85rem; text-transform: uppercase; color: #888;">Subject Performance</h5>
                            ${subjectRows}
                        </div>
                        
                        <div class="glass-card" style="padding: 0.75rem; background: rgba(255,255,255,0.02); grid-column: span 2;">
                            <h5 style="margin: 0 0 0.25rem 0; font-size: 0.85rem; text-transform: uppercase; color: #888;">Recent Activity</h5>
                            ${recentHtml}
                        </div>
                    </div>
                `;
                contentEl.innerHTML = html;
                contentEl.setAttribute('data-loaded', 'true');
            } catch (err) {
                console.error("Failed to load progress:", err);
                contentEl.innerHTML = `<span style='color: #f87171;'>Failed to load: ${err.message}</span>`;
            }
        }

        // --- User Stats ---
        async function loadStats() {
            try {
                console.log("Starting loadStats...");
                const usersSnap = await db.collection('users').get();
                console.log("Users snapshot received. Size:", usersSnap.size);

                const totalUsers = usersSnap.size;
                let proUsers = 0;

                allUsers = [];

                usersSnap.forEach(doc => {
                    const u = doc.data();
                    u.uid = doc.id;
                    if (u.isPro) proUsers++;
                    allUsers.push(u);
                });

                // Sort by name
                allUsers.sort((a, b) => (a.displayName || '').localeCompare(b.displayName || ''));

                filteredUsers = [...allUsers];
                currentPage = 1;
                renderUserTable();

                document.getElementById('total-users').innerText = totalUsers;
                document.getElementById('pro-users').innerText = proUsers;
            } catch (error) {
                console.error("Error loading user stats:", error);
                document.getElementById('total-users').innerText = "Err";
                document.getElementById('pro-users').innerText = "Err";

                document.getElementById('diagnostic-box').style.display = 'block';
                document.getElementById('diagnostic-msg').innerHTML = `
                    <strong>Firestore Error:</strong> ${error.message}<br>
                    Code: ${error.code}<br>
                    Type: ${error.name}
                `;

                const tableBody = document.querySelector('#user-table tbody');
                if (tableBody) {
                    tableBody.innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 1rem; color: #f87171;">
                        Failed to load data. See diagnostics above.
                    </td></tr>`;
                }
            }
        }
    </script>
</body>

</html>
